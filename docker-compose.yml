services:
  chromadb:
    image: chromadb/chroma:latest
    ports:
      - "8000:8000"
    volumes:
      - chroma-data:/chroma/chroma
    environment:
      - IS_PERSISTENT=TRUE
      - CHROMA_SERVER_CORS_ALLOW_ORIGINS=TRUE

  app:
    build: .
    ports:
      - "6767:6767"
    env_file:
      - .env
    environment:
      - PORT=6767
      - CHROMA_URL=http://chromadb:8000
    depends_on:
      - chromadb

volumes:
  chroma-data:
